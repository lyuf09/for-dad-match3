<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>爸爸的开心消消乐</title>
  <script>document.documentElement.classList.add('has-loader');</script>
  <style>
    :root {
      --loader-bg-1: #0b1320;
      --loader-bg-2: #1b2a44;
      --loader-text: #eef4ff;
      --loader-accent: #ffd77a;
    }

    .has-loader,
    .has-loader body {
      min-height: 100%;
      background: var(--loader-bg-1);
    }

    .has-loader body {
      margin: 0;
      color: var(--loader-text);
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    .has-loader body.is-loading {
      overflow: hidden;
    }

    .has-loader body.is-loading .app {
      visibility: hidden;
    }

    .has-loader body.is-ready .app {
      visibility: visible;
    }

    .has-loader .page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--loader-text);
      background:
        radial-gradient(60vmax 48vmax at 20% -10%, rgba(255, 225, 165, 0.14), transparent 60%),
        radial-gradient(50vmax 45vmax at 85% 100%, rgba(125, 170, 255, 0.2), transparent 65%),
        linear-gradient(180deg, var(--loader-bg-2), var(--loader-bg-1));
    }

    .has-loader body.is-loading .page-loader {
      display: flex;
    }

    .has-loader body.is-ready .page-loader {
      display: none;
    }

    .page-loader__panel {
      display: grid;
      justify-items: center;
      gap: 12px;
      padding: 18px 22px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(9, 14, 27, 0.72);
      box-shadow: 0 18px 36px rgba(5, 8, 16, 0.45);
    }

    .page-loader__dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, #fff6cb 0 30%, var(--loader-accent) 30% 62%, rgba(255,215,122,0.28) 62% 100%);
      box-shadow: 0 0 22px rgba(255, 215, 122, 0.42);
      animation: loaderPulse 0.95s ease-in-out infinite alternate;
    }

    .page-loader__text {
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    @keyframes loaderPulse {
      from { transform: scale(0.88); opacity: 0.72; }
      to { transform: scale(1.08); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .page-loader__dot {
        animation: none;
      }
    }
  </style>
  <link rel="stylesheet" href="../assets/css/match3.min.css?v=20260430-loader1" data-page-style />
</head>
<body class="is-loading">
  <div class="page-loader" aria-hidden="true">
    <div class="page-loader__panel">
      <div class="page-loader__dot"></div>
      <div class="page-loader__text">正在加载开心消消乐…</div>
    </div>
  </div>
  <div class="app">
    <div class="header">
      <div class="header-row">
        <a class="back" href="../">返回合集</a>
        <div style="width: 84px;"></div>
      </div>
      <h1>爸爸的开心消消乐</h1>
      <div class="subtitle">轻松消除，快乐每一天</div>
    </div>

    <div class="panel">
      <div class="stats">
        <div class="stat">
          <h3>得分</h3>
          <p id="score">0</p>
        </div>
        <div class="stat">
          <h3>剩余步数</h3>
          <p id="moves">20</p>
        </div>
        <div class="stat">
          <h3>目标分数</h3>
          <p id="target">1200</p>
        </div>
      </div>
    </div>

    <div class="panel board-wrap">
      <div id="message" class="message"></div>
      <div id="board" class="board" aria-label="开心消消乐棋盘"></div>
    </div>

    <div class="panel">
      <div class="settings">
        <div>
          <label for="difficulty">难度</label>
          <select id="difficulty">
            <option value="easy">简单</option>
            <option value="normal" selected>普通</option>
            <option value="hard">困难</option>
            <option value="master">大师</option>
            <option value="hell">地狱</option>
            <option value="extreme">极限</option>
          </select>
        </div>
      </div>
      <div class="controls">
        <button id="restart">重新开始</button>
        <button id="shuffle" class="secondary">洗牌</button>
        <button id="help" class="ghost">玩法说明</button>
      </div>
    </div>

    <div class="tips" id="tips">
      点击或拖动两个相邻的方块进行交换，连成三个或更多同色即可消除。
    </div>
  </div>
  <div class="praise" id="praise"></div>

  <script src="../assets/js/page-transition.min.js?v=20260430-loader1"></script>
  <script src="../assets/js/match3.min.js?v=20260430-loader1"></script>
</body>
</html>
