<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>爸爸的游戏合集</title>
  <script>document.documentElement.classList.add('has-loader');</script>
  <style>
    :root {
      --loader-bg-1: #0b1320;
      --loader-bg-2: #1b2a44;
      --loader-text: #eef4ff;
      --loader-accent: #ffd77a;
    }

    .has-loader,
    .has-loader body {
      min-height: 100%;
      background: var(--loader-bg-1);
    }

    .has-loader body {
      margin: 0;
      color: var(--loader-text);
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    .has-loader body.is-loading {
      overflow: hidden;
    }

    .has-loader body.is-loading .app {
      visibility: hidden;
    }

    .has-loader body.is-ready .app {
      visibility: visible;
    }

    .has-loader .page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--loader-text);
      background:
        radial-gradient(60vmax 48vmax at 20% -10%, rgba(255, 225, 165, 0.14), transparent 60%),
        radial-gradient(50vmax 45vmax at 85% 100%, rgba(125, 170, 255, 0.2), transparent 65%),
        linear-gradient(180deg, var(--loader-bg-2), var(--loader-bg-1));
    }

    .has-loader body.is-loading .page-loader {
      display: flex;
    }

    .has-loader body.is-ready .page-loader {
      display: none;
    }

    .page-loader__panel {
      display: grid;
      justify-items: center;
      gap: 12px;
      padding: 18px 22px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(9, 14, 27, 0.72);
      box-shadow: 0 18px 36px rgba(5, 8, 16, 0.45);
    }

    .page-loader__dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, #fff6cb 0 30%, var(--loader-accent) 30% 62%, rgba(255,215,122,0.28) 62% 100%);
      box-shadow: 0 0 22px rgba(255, 215, 122, 0.42);
      animation: loaderPulse 0.95s ease-in-out infinite alternate;
    }

    .page-loader__text {
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    @keyframes loaderPulse {
      from { transform: scale(0.88); opacity: 0.72; }
      to { transform: scale(1.08); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .page-loader__dot {
        animation: none;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/css/home.min.css?v=20260430-loader1" data-page-style />
</head>
<body class="is-loading">
  <div class="page-loader" aria-hidden="true">
    <div class="page-loader__panel">
      <div class="page-loader__dot"></div>
      <div class="page-loader__text">正在准备游戏…</div>
    </div>
  </div>
  <div class="app">
    <div class="header">
      <h1>爸爸的游戏合集</h1>
      <div class="subtitle">轻松、护眼、适合手机操作</div>
    </div>

    <div class="panel grid">
      <div class="card game-card" data-href="./match3/" tabindex="0" role="link" aria-label="打开开心消消乐">
        <h2>开心消消乐</h2>
        <p>点击或拖动相邻方块，三连消除。节奏轻松，手感舒适。</p>
        <button class="play" type="button" data-href="./match3/">开始游戏</button>
      </div>
      <div class="card game-card" data-href="./sudoku/" tabindex="0" role="link" aria-label="打开数独">
        <h2>数独</h2>
        <p>经典 9×9 数独，点击数字填入，支持一键清除。</p>
        <button class="play" type="button" data-href="./sudoku/">开始游戏</button>
      </div>
    </div>

    <div class="panel footer">
      建议在手机浏览器中打开，并“添加到主屏幕”获得更像 App 的体验。
    </div>
  </div>
  <script src="assets/js/page-transition.min.js?v=20260430-loader1"></script>
  <script src="assets/js/home.min.js?v=20260430-loader1"></script>
</body>
</html>
